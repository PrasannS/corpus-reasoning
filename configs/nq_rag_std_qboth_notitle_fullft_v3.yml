base_model: NousResearch/Llama-3.2-1B

datasets:
  - path: data/nq_train_k20_random_2500_no-titles_split_qboth.jsonl
    type: alpaca
    ds_type: json

val_set_size: 0.0
dataset_prepared_path: data/prepared_nq_rag_std_qboth_notitle_fullft_v3
output_dir: ./outputs/nq-rag-std-qboth-notitle-fullft-v3

wandb_project: corpus-reasoning
wandb_run_id:
wandb_watch:
wandb_name: std_qboth_nq2500_notitle_fullft_lr2e5_3ep
wandb_log_model:

# Task-specific
sequence_len: 8192
micro_batch_size: 1
gradient_accumulation_steps: 8
num_epochs: 3
learning_rate: 2e-5

# Full fine-tuning settings (no adapter)
sample_packing: false
eval_sample_packing: false
optimizer: adamw_torch
lr_scheduler: cosine
bf16: auto
tf32: false
gradient_checkpointing: true
flash_attention: true
logging_steps: 1
saves_per_epoch: 1
evals_per_epoch: 0
warmup_ratio: 0.1
weight_decay: 0.01
max_grad_norm: 1.0
deepspeed: configs/deepspeed_zero2.json
special_tokens:
  pad_token: "<|end_of_text|>"
