base_model: Qwen/Qwen3.5-0.8B-Base

datasets:
  - path: data/hotpotqa_train_k10_shuffled_retrieval_bridge_5000_qboth_bd10.jsonl
    type: alpaca
    ds_type: json

val_set_size: 0.0
output_dir: ./outputs/hotpotqa-k10-std-qboth-qwen-fullft-bd10

wandb_project: corpus-reasoning
wandb_name: std_qboth_hotpotqa_k10_5k_qwen_fullft_bd10

# Task-specific — standard attention, full FT
sequence_len: 4096
micro_batch_size: 1
gradient_accumulation_steps: 8
num_epochs: 1
learning_rate: 1e-5
sample_packing: false
eval_sample_packing: false
flash_attention: false
query_position: both
standard_attention: true
train_on_inputs: false

# Dummy token configuration — must match at eval time.
# These fields are not used by Axolotl; they record what was applied
# to the training data so eval scripts can replicate the same prompt format.
# Training data is generated by:
#   python scripts/data/convert_to_dummy.py data/input_qboth.jsonl data/output_qboth_bd10.jsonl --before-dummy 10
# Eval must use the same flags:
#   python scripts/eval/evaluate_helmet_rag.py ... --before-dummy 10 --after-dummy 0
before_dummy: 10
after_dummy: 0

# Full fine-tuning (no adapter)
optimizer: adamw_8bit
lr_scheduler: cosine
bf16: auto
tf32: true
gradient_checkpointing: true
logging_steps: 1
saves_per_epoch: 0
save_strategy: 'no'
evals_per_epoch: 0
warmup_ratio: 0.1
weight_decay: 0
deepspeed: configs/deepspeed_zero2.json
special_tokens:
  pad_token: "<|endoftext|>"
