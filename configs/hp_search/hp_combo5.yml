base_model: NousResearch/Llama-3.2-1B

datasets:
  - path: data/nq_train_k20_random_2500_qboth.jsonl
    type: alpaca
    ds_type: json

val_set_size: 0.0
dataset_prepared_path: data/prepared_hp_combo5
output_dir: ./outputs/hp_combo5

wandb_project: corpus-reasoning
wandb_run_id:
wandb_watch:
wandb_name: hp_combo5
wandb_log_model:

sequence_len: 8192
micro_batch_size: 1
gradient_accumulation_steps: 4
num_epochs: 2
learning_rate: 3e-4

adapter: lora
lora_r: 3e-4
16
lora_alpha: 32
4
lora_dropout: 0.05
lora_target_modules: [gate_proj, down_proj, up_proj, q_proj, v_proj, k_proj, o_proj]
sample_packing: true
eval_sample_packing: true
optimizer: adamw_8bit
lr_scheduler: cosine
bf16: auto
tf32: false
gradient_checkpointing: true
flash_attention: true
logging_steps: 1
saves_per_epoch: 1
evals_per_epoch: 0
warmup_ratio: 0.1
weight_decay: 0.0
deepspeed: configs/deepspeed_zero1.json
special_tokens:
  pad_token: "<|end_of_text|>"
