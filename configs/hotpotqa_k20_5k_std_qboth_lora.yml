base_model: NousResearch/Llama-3.2-1B
val_set_size: 0.0
wandb_project: corpus-reasoning
wandb_run_id: null
wandb_watch: null
wandb_log_model: null
sequence_len: 8192
micro_batch_size: 1
gradient_accumulation_steps: 8
num_epochs: 1
learning_rate: 0.0005
adapter: lora
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
- gate_proj
- down_proj
- up_proj
- q_proj
- v_proj
- k_proj
- o_proj
sample_packing: true
eval_sample_packing: true
optimizer: adamw_8bit
lr_scheduler: cosine
bf16: auto
tf32: false
gradient_checkpointing: true
flash_attention: true
logging_steps: 1
saves_per_epoch: 0
save_strategy: 'no'
evals_per_epoch: 0
warmup_ratio: 0.1
weight_decay: 0.0
deepspeed: configs/deepspeed_zero1.json
special_tokens:
  pad_token: <|end_of_text|>
datasets:
- path: data/hotpotqa_train_k20_shuffled_bridge_5000_qboth.jsonl
  type: alpaca
  ds_type: json
dataset_prepared_path: data/prepared_hotpotqa_k20_5k_std_qboth_lora
output_dir: ./outputs/hotpotqa-k20-5k-std-qboth-lora
wandb_name: std_qboth_hotpotqa5k_k20_lora
