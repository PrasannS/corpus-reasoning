base_model: NousResearch/Llama-3.2-1B

datasets:
  - path: data/niah_train.jsonl
    type: alpaca
    ds_type: json

val_set_size: 0.0
dataset_prepared_path: data/prepared_niah
output_dir: ./outputs/niah-lora

# Task-specific
sequence_len: 4096
micro_batch_size: 2
gradient_accumulation_steps: 4
num_epochs: 2
learning_rate: 2e-4

# Common LoRA + training settings
adapter: lora
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: [gate_proj, down_proj, up_proj, q_proj, v_proj, k_proj, o_proj]
sample_packing: true
eval_sample_packing: true
optimizer: adamw_8bit
lr_scheduler: cosine
bf16: auto
tf32: false
gradient_checkpointing: true
flash_attention: true
logging_steps: 1
saves_per_epoch: 1
evals_per_epoch: 0
warmup_ratio: 0.1
weight_decay: 0.0
deepspeed: configs/deepspeed_zero1.json
special_tokens:
  pad_token: "<|end_of_text|>"
