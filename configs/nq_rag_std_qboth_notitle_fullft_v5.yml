base_model: NousResearch/Llama-3.2-1B

datasets:
  - path: data/nq_train_k20_random_2500_no-titles_split_qboth.jsonl
    type: alpaca
    ds_type: json

val_set_size: 0.0
dataset_prepared_path: data/prepared_nq_rag_std_qboth_notitle_fullft_v5
output_dir: ./outputs/nq-rag-std-qboth-notitle-fullft-v5

wandb_project: corpus-reasoning
wandb_run_id:
wandb_watch:
wandb_name: std_qboth_nq2500_notitle_fullft_v5_loraconfig
wandb_log_model:

# Exactly match LoRA config but without adapter
sequence_len: 8192
micro_batch_size: 1
gradient_accumulation_steps: 8
num_epochs: 1
learning_rate: 5e-5

# Same settings as LoRA config
sample_packing: true
eval_sample_packing: true
optimizer: adamw_8bit
lr_scheduler: cosine
bf16: auto
tf32: false
gradient_checkpointing: true
flash_attention: true
logging_steps: 1
saves_per_epoch: 1
evals_per_epoch: 0
warmup_ratio: 0.1
weight_decay: 0.0
deepspeed: configs/deepspeed_zero2.json
special_tokens:
  pad_token: "<|end_of_text|>"
