base_model: NousResearch/Llama-3.2-1B

datasets:
  - path: data/nq_train_k20_random_2500_no-titles_split_qboth.jsonl
    type: alpaca
    ds_type: json

val_set_size: 0.0
output_dir: ./outputs/nq-rag-std-qboth-notitle-fullft-frozen-embeds

wandb_project: corpus-reasoning
wandb_name: std_qboth_nq2500_notitle_fullft_frozen_embeds

# Task-specific — standard attention, full FT with frozen embeddings
sequence_len: 8192
micro_batch_size: 1
gradient_accumulation_steps: 8
num_epochs: 1
learning_rate: 1e-5
sample_packing: false
eval_sample_packing: false
flash_attention: false
query_position: both
standard_attention: true
train_on_inputs: false
freeze_embed: true

# Full fine-tuning (no adapter)
optimizer: adamw_8bit
lr_scheduler: cosine
bf16: auto
tf32: true
gradient_checkpointing: true
logging_steps: 1
saves_per_epoch: 1
evals_per_epoch: 0
warmup_ratio: 0.1
weight_decay: 0.0
deepspeed: configs/deepspeed_zero2.json
special_tokens:
  pad_token: "<|end_of_text|>"
