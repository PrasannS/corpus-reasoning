base_model: NousResearch/Llama-3.2-1B

datasets:
  - path: data/arithmetic_train_add_sub_2000.jsonl
    type: alpaca
    ds_type: json

val_set_size: 0.0
dataset_prepared_path: data/prepared_arithmetic_fullft
output_dir: ./outputs/arithmetic-fullft

wandb_project: corpus-reasoning
wandb_run_id:
wandb_watch:
wandb_name: arithmetic_fullft_2000_lr1e5
wandb_log_model:

# Task-specific
sequence_len: 256
micro_batch_size: 8
gradient_accumulation_steps: 4
num_epochs: 3
learning_rate: 1e-5

# Full fine-tuning settings (no adapter)
sample_packing: true
eval_sample_packing: true
optimizer: adamw_torch
lr_scheduler: cosine
bf16: auto
tf32: false
gradient_checkpointing: true
flash_attention: true
logging_steps: 1
saves_per_epoch: 1
evals_per_epoch: 0
warmup_ratio: 0.1
weight_decay: 0.01
max_grad_norm: 1.0
deepspeed: configs/deepspeed_zero2.json
special_tokens:
  pad_token: "<|end_of_text|>"
