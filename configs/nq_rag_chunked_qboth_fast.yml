base_model: NousResearch/Llama-3.2-1B

datasets:
  - path: data/nq_train_k20_random_50000_qboth.jsonl
    type: alpaca
    ds_type: json

val_set_size: 0.0
dataset_prepared_path: data/prepared_nq_rag_chunked_qboth_fast
output_dir: ./outputs/nq-rag-chunked-qboth-50k

wandb_project: corpus-reasoning
wandb_run_id:
wandb_watch:
wandb_name: chunked_qboth_50k_fast
wandb_log_model:

# Task-specific — chunked attention (optimized)
sequence_len: 8192
micro_batch_size: 1
gradient_accumulation_steps: 8
num_epochs: 1
learning_rate: 0.0005
sample_packing: false
eval_sample_packing: false
flash_attention: false
query_position: both

# Common LoRA + training settings
adapter: lora
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: [gate_proj, down_proj, up_proj, q_proj, v_proj, k_proj, o_proj]
optimizer: adamw_8bit
lr_scheduler: cosine
bf16: auto
tf32: true
gradient_checkpointing: true
logging_steps: 1
saves_per_epoch: 1
evals_per_epoch: 0
warmup_ratio: 0.1
weight_decay: 0.0
deepspeed: configs/deepspeed_zero1.json
special_tokens:
  pad_token: "<|end_of_text|>"
